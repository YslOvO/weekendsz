<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeekendSZ 静态预览</title>
    <style>
      body {
        margin: 0;
        background: #f6f0e6;
        color: #24323a;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }
      .page {
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }
      .topbar, .layout {
        max-width: 1240px;
        margin: 0 auto;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.08;
      }
      .subtitle {
        margin-top: 6px;
        color: #66746f;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 20px;
      }
      .map {
        position: relative;
        min-height: 680px;
        overflow: hidden;
        border-radius: 8px;
        background: #dce7df;
        box-shadow: 0 22px 50px rgba(40, 52, 50, 0.16);
      }
      .map img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pin {
        position: absolute;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        gap: 5px;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .dot {
        width: 13px;
        height: 13px;
        border: 3px solid #fff;
        border-radius: 99px;
        background: #e6412d;
        box-shadow: 0 3px 10px rgba(70, 20, 10, 0.35);
      }
      .pin.active .dot {
        width: 18px;
        height: 18px;
        background: #15a36d;
      }
      .label {
        max-width: 96px;
        padding: 4px 7px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.88);
        color: #26343b;
        font-size: 12px;
        line-height: 1.2;
      }
      .panel {
        display: grid;
        gap: 14px;
      }
      .card {
        padding: 16px;
        border: 1px solid rgba(36, 50, 58, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 16px 36px rgba(50, 58, 50, 0.08);
      }
      .eyebrow {
        color: #d33420;
        font-size: 12px;
        font-weight: 800;
      }
      h2 {
        margin: 8px 0;
        font-size: 24px;
      }
      .muted {
        color: #60706a;
        font-size: 14px;
        line-height: 1.6;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .chip {
        padding: 6px 10px;
        border-radius: 7px;
        background: #eaf4f0;
        color: #276050;
        font-size: 12px;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 14px;
      }
      .metric {
        padding: 10px;
        border-radius: 8px;
        background: #f5f2eb;
      }
      .metric strong {
        display: block;
        font-size: 20px;
      }
      .event {
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        background: #fff;
      }
      .event-title {
        font-weight: 800;
      }
      .button {
        height: 40px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: #e6412d;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      .ghost {
        background: #fff;
        color: #24323a;
        border: 1px solid rgba(36, 50, 58, 0.12);
      }
      @media (max-width: 920px) {
        .page { padding: 14px; }
        .layout { grid-template-columns: 1fr; }
        .map { min-height: 520px; }
        .topbar { align-items: start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>WeekendSZ</h1>
          <div class="subtitle">深圳周末去哪玩 · 来源账号覆盖商场静态预览</div>
        </div>
        <button class="button ghost" id="admin">运营台演示</button>
      </header>
      <section class="layout">
        <div class="map" id="map">
          <img src="../src/assets/map/shenzhen-handdrawn-map.png" alt="手绘深圳地图" />
        </div>
        <aside class="panel">
          <div class="card" id="spot"></div>
          <div class="card">
            <span class="eyebrow">本周热门</span>
            <div class="event">
              <div class="event-title">后海生活方式快闪</div>
              <div class="muted">深圳湾万象城 · 即将开始 · 免费入场</div>
            </div>
            <div class="event">
              <div class="event-title">亲子运动体验日</div>
              <div class="muted">深圳前海壹方城 · 即将开始 · 免费入场</div>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script>
      const places = [
        { id: 'mixc-world', name: '深圳万象天地', district: '南山', type: '商场', x: 36, y: 47, heat: 96, eventCount: 3, tags: ['逛街', '展览', '拍照'], summary: '潮流品牌、街区展览和周末快闪密度高，适合情侣逛展拍照。' },
        { id: 'shenzhen-bay-mixc', name: '深圳湾万象城', district: '南山', type: '商场', x: 38, y: 52, heat: 90, eventCount: 2, tags: ['商场', '餐饮', '展览'], summary: '后海核心商场，餐饮、展览和湾区商务客流集中，适合室内轻逛。' },
        { id: 'mixc-luohu', name: '深圳万象城', district: '罗湖', type: '商场', x: 70, y: 50, heat: 83, eventCount: 1, tags: ['商场', '餐饮', '展览'], summary: '成熟高端商圈，适合看展、吃饭和顺路逛罗湖老城。' },
        { id: 'qianhai-hop', name: '深圳前海壹方城', district: '宝安', type: '商场', x: 25, y: 41, heat: 89, eventCount: 2, tags: ['商场', '亲子', '餐饮'], summary: '宝安核心大体量商场，亲子、餐饮和品牌活动密集。' },
        { id: 'upperhills', name: '深业上城UpperHills', district: '福田', type: '商场', x: 61, y: 45, heat: 84, eventCount: 2, tags: ['街区', '快闪', '拍照'], summary: '屋顶街区、品牌快闪和餐饮集中，适合拍照和轻逛。' }
      ]
      const map = document.querySelector('#map')
      const spot = document.querySelector('#spot')
      let selected = places[0]

      function renderSpot() {
        spot.innerHTML = `
          <span class="eyebrow">${selected.district} · ${selected.type}</span>
          <h2>${selected.name}</h2>
          <div class="muted">${selected.summary}</div>
          <div class="metrics">
            <div class="metric"><strong>${selected.heat}</strong><span>热度</span></div>
            <div class="metric"><strong>${selected.eventCount}</strong><span>活动</span></div>
            <div class="metric"><strong>${selected.tags.length}</strong><span>标签</span></div>
          </div>
          <div class="chips">${selected.tags.map((tag) => `<span class="chip">${tag}</span>`).join('')}</div>
          <button class="button" style="margin-top:16px" onclick="alert('正式版进入地点详情页：${selected.name}')">查看详情</button>
        `
      }

      function renderPins() {
        places.forEach((place) => {
          const button = document.createElement('button')
          button.className = `pin ${place.id === selected.id ? 'active' : ''}`
          button.style.left = `${place.x}%`
          button.style.top = `${place.y}%`
          button.innerHTML = `<span class="dot"></span><span class="label">${place.name}</span>`
          button.onclick = () => {
            selected = place
            document.querySelectorAll('.pin').forEach((pin) => pin.remove())
            renderPins()
            renderSpot()
          }
          map.appendChild(button)
        })
      }

      document.querySelector('#admin').onclick = () => {
        alert('运营台：导入一行一个公众号/地点名称，生成采集源，采集结果进入审核池。正式版见 src/pages/admin/index.vue')
      }

      renderPins()
      renderSpot()
    </script>
  </body>
</html>
